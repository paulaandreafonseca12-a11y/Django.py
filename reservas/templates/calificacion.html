<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicha Barber Studio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>

    <section class="info-section py-5">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-lg-6 mb-4">

                    <h1 class="display-4">Califica tu cita </h1>
                    <p class="lead">Ayúdanos a mejorar tu experiencia compartiendo tu opinión sobre nuestro servicio.</p>
                    <form method="post" action="{% url 'calificar_cita' %}">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="rating" class="form-label">Calificación:</label>
                            <select class="form-select" id="rating" name="rating" required>
                                <option value="">Selecciona una calificación</option>
                                <option value="1">1 - Muy malo</option>
                                <option value="2">2 - Malo</option>
                                <option value="3">3 - Regular</option>
                                <option value="4">4 - Bueno</option>
                                <option value="5">5 - Excelente</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="comments" class="form-label">Comentarios:</label>
                            <textarea class="form-control" id="comments" name="comments" rows="4" placeholder="Escribe tus comentarios aquí..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Enviar Calificación</button>
                    </form>
                </div>
