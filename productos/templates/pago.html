{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow p-4">
                <h4 class="text-center mb-4">Datos del Cliente</h4>

                <form onsubmit="procesarCompra(event)">

                    <div class="mb-3">
                        <label>Nombre completo</label>
                        <input type="text" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Correo electrónico</label>
                        <input type="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Teléfono</label>
                        <input type="text" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Dirección de entrega</label>
                        <input type="text" class="form-control" required>
                    </div>

                    <hr>

                    <h5 class="mt-3">Método de Pago</h5>

                    <!-- Pago en persona -->
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="pago" value="persona" onclick="mostrarInfoPago('persona')" required>
                        <label class="form-check-label">
                            Pago en persona (en el local)
                        </label>
                    </div>

                    <!-- Contraentrega -->
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="pago" value="contraentrega" onclick="mostrarInfoPago('contraentrega')">
                        <label class="form-check-label">
                            Pago contraentrega
                        </label>
                    </div>

                    <!-- Mensaje dinámico -->
                    <div id="infoPago" class="alert alert-info mt-3 d-none"></div>

                    <button class="btn btn-success w-100 mt-4">
                        Confirmar Compra
                    </button>

                </form>
            </div>

        </div>
    </div>
</div>

<script>
function mostrarInfoPago(tipo) {
    let info = document.getElementById("infoPago");
    info.classList.remove("d-none");

    if (tipo === "persona") {
        info.innerHTML = "Puedes pagar directamente en nuestro local al recoger tu producto.";
    } else {
        info.innerHTML = "Pagarás al momento de recibir el producto en tu domicilio.";
    }
}

function procesarCompra(event) {
    event.preventDefault();
    alert("Compra realizada con éxito ✅");
}
</script>
{% endblock content %}
