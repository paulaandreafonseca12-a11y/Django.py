{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicha Barber - Recuperar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style2.css' %}">
</head>
<body>
    <div class="back"></div>
    
    <div class="main-container d-flex justify-content-center align-items-center vh-100"> 
        <div class="login-card p-5 shadow-lg text-center" style="background: rgba(0,0,0,0.8); border-radius: 15px;">
            <h2 class="text-center mb-3 text-uppercase fw-bold text-white">Recuperar</h2>
            <p class="text-white-50 mb-4 small">Ingresa tu correo electrónico para enviarte las instrucciones.</p>

            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-4">
                    <input type="email" name="email" class="form-control custom-input" 
                           placeholder="Tu correo electrónico" required>
                </div>

                <button type="submit" class="btn btn-light custom-btn w-100 text-uppercase fw-bold">
                    Enviar Instrucciones
                </button>
            </form>

            <div class="mt-4 text-center">
                <a href="{% url 'login' %}" class="text-white-50 text-decoration-none small">
                   Volver al inicio de sesión
                </a>
            </div>
        </div>
    </div>
</body>
</html>
