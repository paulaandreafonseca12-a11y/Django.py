{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicha Barber - Login</title>
    <link rel="stylesheet" href="{% static 'css/styleinicio.css' %}">

 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  
    
</head>
<body>
    <div class="back"></div>
    
    <div class="position-fixed top-0 w-100 py-3"> 
        <a href="/" class="text-white text-decoration-none d-flex justify-content-center fs-1"> 
            <strong>CHICHA BARBER</strong>
        </a>
    </div>

    <div class="main-container d-flex justify-content-center align-items-center vh-100"> 
        <div class="login-card p-5 shadow-lg text-center" style="background: rgba(0,0,0,0.8); border-radius: 15px;">
                <h2
                    class="text-center mb-4 text-uppercase fw-bold text-white">Inicia
                    Sesión</h2>


            {% if form.errors %}
                <div class="alert alert-danger p-2 small">
                    Usuario o contraseña incorrectos.
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                
                <div class="mb-4">
                    <input type="text" name="username" class="form-control custom-input" 
                           placeholder="Nombre de Usuario" required autofocus>
                </div>

                <div class="mb-5">
                    <input type="password" name="password" class="form-control custom-input" 
                           placeholder="Contraseña" required>
                </div>

                <button type="submit" class="btn btn-light custom-btn w-100 text-uppercase fw-bold">
                    Ingresar
                </button>
            </form>

            <div class="mt-4 text-center">
                <a href="{% url 'password_reset' %}" class="text-white-50 text-decoration-none small">
                   <i class="bi bi-question-circle me-1"></i> ¿Olvidaste tu contraseña?
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
