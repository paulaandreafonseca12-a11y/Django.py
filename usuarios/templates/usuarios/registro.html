{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Chicha Barber</title>
    <link rel="stylesheet" href="{% static 'css/style1.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>
    <div class="back"></div>

    <header class="site-header">
        <a href="/"><strong>CHICHA BARBER</strong></a>
    </header>

    <div class="main-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-7 col-sm-10">
                    <div class="registro-card shadow-lg">
                        <div class="card-body p-4">
                            <h3 class="text-center text-white mb-1 fw-bold">Crear Cuenta</h3>
                            <p class="text-center mb-4 subtitulo">Completa el formulario para registrarte</p>

                            <form method="POST">
                                {% csrf_token %}
                                
                                <div class="mb-3">
                                    <label class="form-label text-white">Nombre completo</label>
                                    <div class="input-wrap">
                                        <i class="bi bi-person input-icon"></i>
                                        {{ form.nombre_completo }}
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label text-white">Correo electrónico</label>
                                    <div class="input-wrap">
                                        <i class="bi bi-envelope input-icon"></i>
                                        {{ form.email }}
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label text-white">Teléfono</label>
                                    <div class="input-wrap">
                                        <i class="bi bi-phone input-icon"></i>
                                        {{ form.telefono }}
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label text-white">Contraseña</label>
                                    <div class="input-wrap">
                                        <i class="bi bi-lock input-icon"></i>
                                        {{ form.password1 }}
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label text-white">Confirmar contraseña</label>
                                    <div class="input-wrap">
                                        <i class="bi bi-lock-fill input-icon"></i>
                                        {{ form.password2 }}
                                    </div>
                                </div>

                                <div class="form-check mb-3">
                                    <input class="form-check-input" type="checkbox" id="terminos" required>
                                    <label class="form-check-label text-white" for="terminos">
                                        Acepto los <a href="#" class="text-warning">términos y condiciones</a>
                                    </label>
                                </div>

                                <button type="submit" class="btn w-100 fw-bold btn-registrar">
                                    Registrarse
                                </button>
                            </form>

                            <p class="text-center mt-3 text-white">
                                ¿Ya tienes cuenta?
                                <a href="{% url 'login' %}" class="text-warning fw-bold">Inicia sesión</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
