{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow p-4">
                <h4 class="text-center mb-4">Datos del Cliente</h4>

                <form method="POST" action="{% url 'procesar_compra' %}">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label>Nombre completo</label>
                        <input type="text" name="nombre" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Correo electrónico</label>
                        <input type="email" name="correo" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Teléfono</label>
                        <input type="text" name="telefono" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Dirección de entrega</label>
                        <input type="text" name="direccion" class="form-control" required>
                    </div>

                    <hr>

                    <h5 class="mt-3">Método de Pago</h5>

                    <!-- ✅ CORREGIDO: name="pago" -->
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="pago" value="persona" onclick="mostrarInfoPago('persona')" required>
                        <label class="form-check-label">
                            Pago en persona (en el local)
                        </label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="pago" value="contraentrega" onclick="mostrarInfoPago('contraentrega')">
                        <label class="form-check-label">
                            Pago contraentrega
                        </label>
                    </div>

                    <!-- Datos ocultos -->
                    <input type="hidden" name="producto_id" value="1">
                    <input type="hidden" name="cantidad" value="1">
                    <input type="hidden" name="total" value="25000">

                    <div id="infoPago" class="alert alert-info mt-3 d-none"></div>

                    <button type="submit" class="btn btn-success w-100 mt-4">
                        Confirmar Compra
                    </button>

                </form>
            </div>

        </div>
    </div>
</div>

<script>
function mostrarInfoPago(tipo) {
    let info = document.getElementById("infoPago");
    info.classList.remove("d-none");

    if (tipo === "persona") {
        info.innerHTML = "Puedes pagar directamente en nuestro local.";
    } else {
        info.innerHTML = "Pagarás cuando recibas el producto.";
    }
}
</script>
{% endblock content %}
